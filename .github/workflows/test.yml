name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest
      - name: Run pytest
        run: |
          # Exit code 5 = "no tests collected"; treat that as success so repos
          # without a test suite still pass, but real test failures fail the build.
          set +e
          pytest -v
          rc=$?
          if [ "$rc" -eq 5 ]; then
            echo "No tests collected — skipping (no test suite present)."
            exit 0
          fi
          exit "$rc"
